  .tab.active::after{
    content:"";position:absolute;left:0;right:0;top:0;height:3px;border-radius:3px;
  }
  .tab[data-target="mamba"].active::after{background:var(--mamba)}
  .tab[data-target="jamba"].active::after{background:var(--jamba)}
  .tab[data-target="samba"].active::after{background:var(--samba)}
  .tab[data-target="hymba"].active::after{background:var(--hymba)}
  .tab[data-target="mamba"].active .tx b{color:var(--mamba)}
  .tab[data-target="jamba"].active .tx b{color:var(--jamba)}
  .tab[data-target="samba"].active .tx b{color:var(--samba)}
  .tab[data-target="hymba"].active .tx b{color:var(--hymba)}

    background:var(--bg);display:none;
  }

  @media(max-width:680px){

    .tab{padding:9px 13px}

<!-- HERO -->
<header class=&quot;hero wrap&quot;>
  <div class=&quot;snake&quot;>🐍</div>
  <h1>Mamba <span>:</span><br><span>Selective State Space Models</span></h1>
  <div class=&quot;sub&quot;>線形時間で動く、選択的状態空間モデルの技術解説</div>
  <div class=&quot;paper&quot;>
    <span class=&quot;pill&quot;>Albert Gu &amp;amp; Tri Dao</span>
    <span class=&quot;pill&quot;>arXiv:2312.00752</span>
    <span class=&quot;pill&quot;>2023年12月</span>
    <span class=&quot;pill&quot;>CMU / Princeton</span>
  </div>

  <div class=&quot;thesis&quot;>
    Transformer は「文脈を全く圧縮しない」から強く、しかし重い。SSM/RNN は「全部を固定状態に圧縮する」から軽いが、内容を見分けられない。
    Mamba のたった一つの発明は <b>「選択 (Selection)」</b> ── 状態空間モデルのパラメータを入力依存にすることで、軽い固定サイズ状態に <b>内容を見分ける圧縮ポリシー</b> を持たせ、効率と性能のトレードオフを破った。
  </div>

  <div class=&quot;heroStats reveal&quot;>
    <div class=&quot;s&quot;><div class=&quot;n&quot;>O(N)</div><div class=&quot;l&quot;>系列長に対し線形時間</div></div>
    <div class=&quot;s&quot;><div class=&quot;n&quot;>5×</div><div class=&quot;l&quot;>Transformer比の推論スループット</div></div>
    <div class=&quot;s&quot;><div class=&quot;n&quot;>100万</div><div class=&quot;l&quot;>トークンの系列長に対応</div></div>
    <div class=&quot;s&quot;><div class=&quot;n&quot;>0</div><div class=&quot;l&quot;>KVキャッシュ（定数メモリ推論）</div></div>
  </div>
</header>

<!-- SECTION 1 -->
<section id=&quot;s1&quot; class=&quot;wrap&quot;>
  <div class=&quot;shead reveal&quot;>
    <div class=&quot;snum&quot;>01</div>
    <div>
      <span class=&quot;en&quot;>Before Mamba</span>
      <h2>Mamba 登場前の課題</h2>
      <p>すべての系列モデルは「文脈をどう状態に圧縮するか」で性能と効率が決まる。Mamba 以前は、その圧縮の仕方に根本的なジレンマがあった。</p>
    </div>
  </div>

  <div class=&quot;tension reveal&quot;>
    <div class=&quot;tcol t-eff&quot;>
      <div class=&quot;vs&quot;>効果的 / 非効率</div>
      <div class=&quot;ttl&quot;>⚡ Transformer（自己注意）</div>
      <div class=&quot;row&quot;><span class=&quot;ico good&quot;>✓</span><span><b>文脈を一切圧縮しない</b>ので、過去の全トークンを完全に参照できる（完璧な想起）</span></div>
      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span>学習は系列長 N に対し <b>O(N²)</b> の計算・メモリ</span></div>
      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span>推論時は <b>KVキャッシュが線形に膨張</b>し、生成が遅く・重い</span></div>
      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span>有限の窓の外をモデル化できない</span></div>
    </div>
    <div class=&quot;tmid&quot;><div class=&quot;vsbadge&quot;>VS</div></div>
    <div class=&quot;tcol t-ssm&quot;>
      <div class=&quot;vs&quot;>効率的 / 限定的</div>
      <div class=&quot;ttl&quot;>🧠 RNN / SSM（S4 など）</div>
      <div class=&quot;row&quot;><span class=&quot;ico good&quot;>✓</span><span>すべてを<b>固定サイズの状態</b>に圧縮 → 推論は定数時間・定数メモリ</span></div>
      <div class=&quot;row&quot;><span class=&quot;ico good&quot;>✓</span><span>LTI なら畳み込み形で並列学習でき、長距離ベンチで圧勝</span></div>
      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span><b>LTI（線形時不変）</b>: A,B,C が全トークンで固定 → 内容で選別できない</span></div>
      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span>テキストのような密な離散データで Transformer に負ける</span></div>
    </div>
  </div>

  <div class=&quot;axisnote reveal&quot;>
    💡 論文の核心的な再定義 ── <b>「効率と性能のトレードオフは、状態がどれだけ上手く文脈を圧縮できるかで決まる」</b>。
    効率的なモデルは小さな状態を持たねばならず、効果的なモデルは文脈の必要情報をすべて含む状態を持たねばならない。
    そして決定的だったのは、<b>LTI（時不変性）は「効率のために強制されていた」</b>こと ── 時不変だからこそ畳み込みで高速学習できたが、その代償が「内容を見分けられない」だった。
  </div>

  <div class=&quot;tasks reveal&quot;>
    <div class=&quot;task&quot;>
      <div class=&quot;qn&quot;>🎯 Selective Copying（選択的コピー）</div>
      <div class=&quot;desc&quot;>記憶すべきトークンの<b>間隔をランダム化</b>。ノイズを無視し、内容に基づいて覚える「内容認識」が必須。静的な畳み込みカーネルでは可変間隔を表現できず、LTI モデルは失敗する。</div>
      <div class=&quot;bar&quot;><span class=&quot;lab&quot;>S4 (LTI)</span><div class=&quot;track&quot;><div class=&quot;fill lo&quot; style=&quot;width:19%&quot;>18.3%</div></div></div>
      <div class=&quot;bar&quot;><span class=&quot;lab&quot;>Mamba (S6)</span><div class=&quot;track&quot;><div class=&quot;fill hi&quot; style=&quot;width:97%&quot;>97.0%</div></div></div>
    </div>
    <div class=&quot;task&quot;>
      <div class=&quot;qn&quot;>🔁 Induction Heads（連想想起）</div>
      <div class=&quot;desc&quot;>「Harry Potter」を見た後、再び「Harry」が来たら「Potter」を出す。LLM の <b>in-context learning</b> の核とされる機構。内容に基づき「どの過去トークンを思い出すか」を選ぶ必要がある。</div>
      <div class=&quot;bar&quot;><span class=&quot;lab&quot;>訓練長</span><div class=&quot;track&quot;><div class=&quot;fill lo&quot; style=&quot;width:12%&quot;>256</div></div></div>
      <div class=&quot;bar&quot;><span class=&quot;lab&quot;>Mamba外挿</span><div class=&quot;track&quot;><div class=&quot;fill hi&quot; style=&quot;width:100%&quot;>100万 (4000×)</div></div></div>
    </div>
  </div>
</section>

<!-- SECTION 2 -->
<section id=&quot;s2&quot; class=&quot;wrap&quot;>
  <div class=&quot;shead reveal&quot;>
    <div class=&quot;snum&quot;>02</div>
    <div>
      <span class=&quot;en&quot;>What Mamba Enables</span>
      <h2>Mamba が実現できること</h2>
      <p>選択機構と、それを動かすハードウェア対応アルゴリズムにより、Mamba は「効率」と「性能」を同時に手に入れた。具体的な数字で見ていく。</p>
    </div>
  </div>

  <div class=&quot;bigstats reveal&quot;>
    <div class=&quot;bs&quot;><div class=&quot;n&quot;>O(N)</div><div class=&quot;l&quot;><b>線形時間スケーリング</b><br>注意の O(N²) に対し、計算もメモリも系列長に線形</div></div>
    <div class=&quot;bs&quot;><div class=&quot;n&quot;>4–5<span class=&quot;u&quot;>×</span></div><div class=&quot;l&quot;><b>推論スループット</b><br>同サイズ Transformer 比。KVキャッシュ不要で大バッチが可能</div></div>
    <div class=&quot;bs&quot;><div class=&quot;n&quot;>20–40<span class=&quot;u&quot;>×</span></div><div class=&quot;l&quot;><b>選択スキャンの速度</b><br>素朴な PyTorch スキャン比。系列長2K超で FlashAttention-2 より速い</div></div>
    <div class=&quot;bs&quot;><div class=&quot;n&quot;>2<span class=&quot;u&quot;>×</span></div><div class=&quot;l&quot;><b>パラメータ効率</b><br>Mamba-3B が「2倍サイズの Transformer」に匹敵する品質</div></div>
  </div>

  <p style=&quot;color:var(--muted);margin:6px 0 18px;font-size:.92rem&quot;>推論の具体例: バッチ128 で Mamba-1.4B = <span style=&quot;font-family:var(--mono);color:var(--teal)&quot;>1814 tok/s</span> に対し Transformer-1.3B = <span style=&quot;font-family:var(--mono);color:var(--red)&quot;>364 tok/s</span>。自己回帰生成は「過去要素のキャッシュ不要」で、ステップあたり定数時間・定数メモリ。</p>

  <div class=&quot;domains reveal&quot;>
    <div class=&quot;dom&quot;>
      <div class=&quot;ic&quot;>💬</div>
      <h4>言語モデリング</h4>
      <p>注意機構なしで初めて、強力な Transformer++（LLaMaレシピ）に匹敵。</p>
      <div class=&quot;res&quot;>Mamba-2.8B 平均 63.3 pt<br>vs Pythia-2.8B 59.1 pt<br>Pile ppl: 6.22（同 6.73）</div>
    </div>
    <div class=&quot;dom&quot;>
      <div class=&quot;ic&quot;>🧬</div>
      <h4>ゲノミクス（DNA）</h4>
      <p>系列長を伸ばすほど精度が向上。LTI ベースライン(HyenaDNA)は逆に悪化。</p>
      <div class=&quot;res&quot;>最大 2²⁰ = 1,048,576 塩基<br>5種の大型類人猿を分類<br>（DNA約99%が共通）</div>
    </div>
    <div class=&quot;dom&quot;>
      <div class=&quot;ic&quot;>🔊</div>
      <h4>音声波形</h4>
      <p>生の波形を自己回帰生成。従来SOTAの半分以下の FID を達成。</p>
      <div class=&quot;res&quot;>SC09 音声生成<br>FID 0.94<br>vs SaShiMi 1.99（−52%超）</div>
    </div>
  </div>

  <div class=&quot;axisnote reveal&quot; style=&quot;border-style:solid&quot;>
    🚀 <b style=&quot;color:var(--teal)&quot;>なぜ重要か</b> ── ① <b>長文脈アプリ</b>（ゲノム・音声・長文書・コードベース）で注意の二次コストを回避。

<!-- SECTION 3 -->
<section id=&quot;s3&quot; class=&quot;wrap&quot;>
  <div class=&quot;shead reveal&quot;>
    <div class=&quot;snum&quot;>03</div>
    <div>
      <span class=&quot;en&quot;>Related Research / Lineage</span>
      <h2>Mamba の関連研究と系譜</h2>
      <p>Mamba は突然現れたのではない。HiPPO に始まる<b>状態空間モデルの本流</b>と、線形注意に始まる<b>RNN復権の流れ</b>── 2つの系譜が収束した到達点である。多くが Gu・Dao・Ré（Stanford Hazy Research）に繋がる。</p>
    </div>
  </div>

  <div class=&quot;tracks reveal&quot;>
    <div class=&quot;trackkey&quot;><span class=&quot;dotA&quot;></span>Track A — 状態空間モデル本流（SSM spine）</div>
    <div class=&quot;trackkey&quot;><span class=&quot;dotB&quot;></span>Track B — 線形注意 / RNN復権</div>
  </div>

  <div class=&quot;tlwrap reveal&quot;>
    <div class=&quot;tlrow&quot;>
      <div class=&quot;yr&quot;>2020</div>
      <div class=&quot;tcell acol&quot;>
        <div class=&quot;tnode a&quot;><div class=&quot;nm&quot;><span>HiPPO</span><span class=&quot;y&quot;>2008.07669</span></div><div class=&quot;ds&quot;>記憶を「オンライン関数近似」として定式化。履歴を多項式基底に射影する HiPPO 行列 A を導出 ── 全系譜の理論的礎。</div></div>
      </div>
      <div class=&quot;tcell bcol&quot;>
        <div class=&quot;tnode b&quot;><div class=&quot;nm&quot;><span>Linear Attention</span><span class=&quot;y&quot;>2006.16236</span></div><div class=&quot;ds&quot;>「Transformers are RNNs」。softmax をカーネルに置換し、注意を O(N) の線形再帰へ。行列値状態を持つRNNと等価。</div></div>
      </div>
    </div>
    <div class=&quot;tlrow&quot;>
      <div class=&quot;yr&quot;>2021</div>
      <div class=&quot;tcell acol&quot;>
        <div class=&quot;tnode a&quot;><div class=&quot;nm&quot;><span>LSSL</span><span class=&quot;y&quot;>2110.13985</span></div><div class=&quot;ds&quot;>SSM を深層学習の層に。「再帰 ⇄ 畳み込み ⇄ 連続時間」の三位一体（duality）を確立。ただし計算は非実用的だった。</div></div>
        <div class=&quot;tnode a&quot;><div class=&quot;nm&quot;><span>S4</span><span class=&quot;y&quot;>2111.00396</span></div><div class=&quot;ds&quot;>実用的な基礎SSM。NPLR（正規+低ランク）構造で計算を O(N log N) に。Long Range Arena を席巻し Path-X を初めて解いた。<b>Mamba の直接の親</b>。</div></div>
      </div>
      <div class=&quot;tcell bcol&quot;></div>
    </div>
    <div class=&quot;tlrow&quot;>
      <div class=&quot;yr&quot;>2022</div>
      <div class=&quot;tcell acol&quot;>
        <div class=&quot;tnode a&quot;><div class=&quot;nm&quot;><span>DSS / S4D</span><span class=&quot;y&quot;>2203.14343 / 2206.11893</span></div><div class=&quot;ds&quot;>低ランク補正を捨て<b>対角SSM</b>でも同等と証明。Mamba の対角 A と初期化(S4D-Real)はここから。</div></div>
        <div class=&quot;tnode a&quot;><div class=&quot;nm&quot;><span>S5</span><span class=&quot;y&quot;>2208.04933</span></div><div class=&quot;ds&quot;>MIMO化し、畳み込みを捨てて<b>並列スキャン</b>で再帰を直接計算。Mamba のスキャン戦略の方法論的橋渡し。</div></div>
        <div class=&quot;tnode a&quot;><div class=&quot;nm&quot;><span>GSS</span><span class=&quot;y&quot;>2206.13947</span></div><div class=&quot;ds&quot;>対角SSMを<b>ゲート付き活性化</b>で包む。「SSM + GLU型ゲート」が言語で効く、という流れ。</div></div>
        <div class=&quot;tnode a&quot;><div class=&quot;nm&quot;><span>H3 (Hungry Hungry Hippos)</span><span class=&quot;y&quot;>2212.14052</span></div><div class=&quot;ds&quot;>言語で注意との差を本格的に縮めた。shift SSM + 対角SSM + 乗算ゲート。<b>Mamba ブロックの構造的な親</b>。</div></div>
      </div>
      <div class=&quot;tcell bcol&quot;>
        <div class=&quot;tnode b&quot;><div class=&quot;nm&quot;><span>FlashAttention</span><span class=&quot;y&quot;>2205.14135</span></div><div class=&quot;ds&quot;>注意の高速「実装」。IO 対応（HBM⇄SRAM のメモリ階層）+ タイリング + 再計算。<b>Mamba の選択スキャンの設計思想の祖</b>（著者 Tri Dao が共通）。</div></div>
      </div>
    </div>
    <div class=&quot;tlrow&quot;>
      <div class=&quot;yr&quot;>2023</div>
      <div class=&quot;tcell acol&quot;>
        <div class=&quot;tnode a&quot;><div class=&quot;nm&quot;><span>Hyena</span><span class=&quot;y&quot;>2302.10866</span></div><div class=&quot;ds&quot;>H3 の後継。SSM再帰の代わりに<b>暗黙的な長い畳み込み</b>+データ制御ゲート。FFTで準二次。Mamba の主要な同時代ライバル。</div></div>
      </div>
      <div class=&quot;tcell bcol&quot;>
        <div class=&quot;tnode b&quot;><div class=&quot;nm&quot;><span>RWKV</span><span class=&quot;y&quot;>2305.13048</span></div><div class=&quot;ds&quot;>RNN を Transformer 時代に再発明。並列学習・O(1)推論の二形式。14Bまでスケール。decay は<b>データ非依存</b>。</div></div>
        <div class=&quot;tnode b&quot;><div class=&quot;nm&quot;><span>RetNet</span><span class=&quot;y&quot;>2307.08621</span></div><div class=&quot;ds&quot;>Retention 機構。並列/再帰/チャンク再帰の3形式が等価。減衰はLTI的（データ非依存）。Mamba との対比が鮮やか。</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;arrowdown reveal&quot;>▼</div>
  <div class=&quot;converge reveal&quot;>
    <div class=&quot;big&quot;>🐍 MAMBA — 2つの系譜の収束（2023年12月）</div>
    <p>
      <b style=&quot;color:var(--teal)&quot;>S4/S4D の対角SSM</b>（HiPPO行列で初期化）に、<b style=&quot;color:var(--teal)&quot;>H3 の言語向けゲート付きブロック</b>を与え、
      <b style=&quot;color:var(--purple)&quot;>線形注意/RWKV/RetNet のデータ依存再帰</b>の精神で内容選択的にし、
      <b style=&quot;color:var(--purple)&quot;>S5 の並列スキャン</b>を <b style=&quot;color:var(--purple)&quot;>FlashAttention のハードウェア対応規律</b>の下で高速化した ── それが Mamba。

<!-- SECTION 4 -->
<section id=&quot;s4&quot; class=&quot;wrap&quot;>
  <div class=&quot;shead reveal&quot;>
    <div class=&quot;snum&quot;>04</div>
    <div>
      <span class=&quot;en&quot;>Algorithm &amp;amp; Implementation</span>
      <h2>Mamba のアルゴリズムと実現方法</h2>
      <p>「連続SSM → 離散化 → 二つの表現 → <b>選択機構(核心)</b> → ハードウェア対応スキャン → Mamba ブロック」の順で、仕組みを段階的に解剖する。</p>
    </div>
  </div>

  <!-- 4.1 -->
  <div class=&quot;step reveal&quot;>
    <div class=&quot;sk&quot;>STEP 1 — 基礎</div>
    <h3>状態空間モデル（SSM）とは</h3>
    <p>SSM は1次元の入力 <i>x(t)</i> を、N次元の潜在状態 <i>h(t)</i> を経由して出力 <i>y(t)</i> へ写す連続時間システム。4つのパラメータ <i>(Δ, A, B, C)</i> で定義される。</p>
    <div class=&quot;eq&quot;>
      <i>h</i>′(<i>t</i>) <span class=&quot;op&quot;>=</span> <i>A h</i>(<i>t</i>) <span class=&quot;op&quot;>+</span> <i>B x</i>(<i>t</i>)
      <span style=&quot;margin-left:28px&quot;><i>y</i>(<i>t</i>) <span class=&quot;op&quot;>=</span> <i>C h</i>(<i>t</i>)</span>
      <small>状態方程式（左）と出力方程式（右）</small>
    </div>
    <div class=&quot;params&quot;>
      <div class=&quot;param&quot;><div class=&quot;v&quot;>A</div><div class=&quot;nm&quot;>(N×N) 状態の発展・減衰<br>= 記憶のダイナミクス</div></div>
      <div class=&quot;param&quot;><div class=&quot;v&quot;>B</div><div class=&quot;nm&quot;>(N×1) 入力を<br>状態へ取り込む</div></div>
      <div class=&quot;param&quot;><div class=&quot;v&quot;>C</div><div class=&quot;nm&quot;>(1×N) 状態を<br>出力へ写す</div></div>
      <div class=&quot;param&quot;><div class=&quot;v&quot;>Δ</div><div class=&quot;nm&quot;>ステップ幅<br>= 入力の「解像度」</div></div>
    </div>
    <p>A は HiPPO 理論で初期化され、履歴を効率的に記憶する（Mamba の既定は S4D-Real）。</p>
  </div>

  <!-- 4.2 -->
  <div class=&quot;step reveal&quot;>
    <div class=&quot;sk&quot;>STEP 2 — 離散化</div>
    <h3>連続を離散へ：ゼロ次ホールド（ZOH）</h3>
    <p>トークンは離散なので、ステップ幅 <i>Δ</i> で連続システムを離散化する。<i>(Δ, A, B)</i> → 離散版 <i>(Ā, B̄)</i> へ変換し、「関数→関数」の写像を「系列→系列」へ。離散化は学習時の<b>前向き計算の最初のステップ</b>として行われる。</p>
    <div class=&quot;eq&quot;>
      <span class=&quot;ovl&quot;>A</span> <span class=&quot;op&quot;>=</span> exp(<i>Δ A</i>)
      <span style=&quot;margin-left:34px&quot;><span class=&quot;ovl&quot;>B</span> <span class=&quot;op&quot;>=</span> (<i>Δ A</i>)<sup>−1</sup>(exp(<i>Δ A</i>) <span class=&quot;op&quot;>−</span> <i>I</i>) <span class=&quot;op&quot;>·</span> <i>Δ B</i></span>
      <small>ゼロ次ホールドによる離散化（Δ が「各値をどれだけ保持するか」= 解像度を決める）</small>
    </div>
  </div>

  <!-- 4.3 -->
  <div class=&quot;step reveal&quot;>
    <div class=&quot;sk&quot;>STEP 3 — 二つの表現</div>
    <h3>再帰 ⇄ 畳み込みの<span class=&quot;em&quot;>双対性</span></h3>
    <p>離散化された LTI な SSM は、数学的に等価な<b>2通り</b>で計算できる。S4 までの戦略は「畳み込みで並列学習し、再帰で高速推論」── ただしこれは <b>LTI（時不変）でないと成立しない</b>。</p>
    <div class=&quot;dual&quot;>
      <div class=&quot;dualbox rec&quot;>
        <div class=&quot;h&quot;>🔄 再帰形（Recurrent）</div>
        <div class=&quot;meta&quot;>推論向き / ステップあたり O(1)・定数メモリ</div>
        <div class=&quot;eq&quot; style=&quot;font-size:1.05rem;text-align:left;margin:0&quot;>
          <i>h</i><sub>t</sub> <span class=&quot;op&quot;>=</span> <span class=&quot;ovl&quot;>A</span> <i>h</i><sub>t−1</sub> <span class=&quot;op&quot;>+</span> <span class=&quot;ovl&quot;>B</span> <i>x</i><sub>t</sub><br>
          <i>y</i><sub>t</sub> <span class=&quot;op&quot;>=</span> <i>C h</i><sub>t</sub>
        </div>
      </div>
      <div class=&quot;dualbox conv&quot;>
        <div class=&quot;h&quot;>🌀 畳み込み形（Convolutional）</div>
        <div class=&quot;meta&quot;>学習向き / 系列全体を並列計算</div>
        <div class=&quot;eq&quot; style=&quot;font-size:1.05rem;text-align:left;margin:0&quot;>
          <span class=&quot;ovl&quot;>K</span> <span class=&quot;op&quot;>=</span> (<i>C</i><span class=&quot;ovl&quot;>B</span>, <i>C</i><span class=&quot;ovl&quot;>A</span><span class=&quot;ovl&quot;>B</span>, …, <i>C</i><span class=&quot;ovl&quot;>A</span><sup>k</sup><span class=&quot;ovl&quot;>B</span>, …)<br>
          <i>y</i> <span class=&quot;op&quot;>=</span> <i>x</i> <span class=&quot;op&quot;>∗</span> <span class=&quot;ovl&quot;>K</span>
        </div>
      </div>
    </div>
    <p style=&quot;margin-top:12px;font-size:.88rem&quot;>畳み込みが必要な理由: 再帰形は形状 (B, L, D, <b>N</b>) の状態を実体化する必要があり、入出力より N(≈10〜100)倍も大きい。畳み込みはこれを回避できる。</p>
  </div>

  <!-- 4.4 KEY -->
  <div class=&quot;step reveal&quot; style=&quot;border-color:var(--border2);background:linear-gradient(160deg,rgba(61,215,198,.07),rgba(167,139,250,.05))&quot;>
    <div class=&quot;sk&quot;>STEP 4 — ★ 核心の発明</div>
    <h3>選択機構：<span class=&quot;em&quot;>Selective SSM (S6)</span></h3>
    <p>たった一つのアイデア ── <b>B, C, Δ を入力 x の関数にする</b>（入力依存にする）。これが LTI を破り、モデルを時変にする。S4(Algorithm 1) では静的だったパラメータが、トークンごとに変わる。</p>
    <table>
      <thead><tr><th>パラメータ</th><th>S4（LTI）</th><th>Mamba / S6</th><th>入力依存？</th></tr></thead>
      <tbody>
        <tr><td><span class=&quot;mono&quot;>A</span></td><td><span class=&quot;mono&quot;>(D, N)</span> 固定</td><td><span class=&quot;mono&quot;>(D, N)</span> 固定</td><td class=&quot;no&quot;>No（あえて静的）</td></tr>
        <tr class=&quot;hl-row&quot;><td><span class=&quot;mono&quot;>B</span></td><td><span class=&quot;mono&quot;>(D, N)</span> 固定</td><td class=&quot;mono&quot; style=&quot;color:var(--teal)&quot;>(B, L, N) ← s_B(x)</td><td class=&quot;yes&quot;>Yes</td></tr>
        <tr class=&quot;hl-row&quot;><td><span class=&quot;mono&quot;>C</span></td><td><span class=&quot;mono&quot;>(D, N)</span> 固定</td><td class=&quot;mono&quot; style=&quot;color:var(--teal)&quot;>(B, L, N) ← s_C(x)</td><td class=&quot;yes&quot;>Yes</td></tr>
        <tr class=&quot;hl-row&quot;><td><span class=&quot;mono&quot;>Δ</span></td><td><span class=&quot;mono&quot;>(D)</span></td><td class=&quot;mono&quot; style=&quot;color:var(--teal)&quot;>(B, L, D) ← τ(P+s_Δ(x))</td><td class=&quot;yes&quot;>Yes</td></tr>
      </tbody>
    </table>
    <p>新たに加わった<b>系列次元 L</b> が「時変」の正体。B は「入力を状態に入れるか」、C は「状態を出力に出すか」を、その場のトークン内容で変調する ── これが<b>内容に基づく推論</b>を可能にし、Selective Copying と Induction Heads を解く。</p>

    <p style=&quot;margin-top:14px&quot;><b>Δ は何を制御するか ── 注目するか / 無視するか:</b></p>
    <div class=&quot;focusbox&quot;>
      <div class=&quot;fb big&quot;>
        <div class=&quot;d&quot;>Δ → ∞</div>
        <div class=&quot;t&quot;>🔆 現在の入力に注目（focus）</div>
        <p>状態をリセットし、今の入力を強く取り込む。文書境界のリセットにも対応。</p>
      </div>
      <div class=&quot;fb small&quot;>
        <div class=&quot;d&quot;>Δ → 0</div>
        <div class=&quot;t&quot;>🌫 現在の入力を無視（ignore）</div>
        <p>状態を保持し、今の入力（ノイズ等）をフィルタして捨てる。</p>
      </div>
    </div>
    <p style=&quot;margin-top:14px;font-size:.9rem&quot;><b>定理1:</b> N=1, A=−1, B=1 等の特別な場合、この選択的再帰は<b>古典的なゲート付きRNN</b>と完全に一致する ── <i>h<sub>t</sub> = (1−g<sub>t</sub>)h<sub>t−1</sub> + g<sub>t</sub>x<sub>t</sub></i>。
    つまり「SSMの離散化は、ヒューリスティックなゲート機構の原理的な基礎」である。A を静的に保つのは、Δ が選択的なら <span class=&quot;mono&quot;>Ā=exp(ΔA)</span> 経由で十分に選択的になるため。</p>
  </div>

  <!-- 4.5 -->
  <div class=&quot;step reveal&quot;>
    <div class=&quot;sk&quot;>STEP 5 — ハードウェア対応</div>
    <h3>選択スキャン：<span class=&quot;em&quot;>Selective Scan</span></h3>
    <p>選択機構は畳み込みを壊す（カーネルが固定でなくなる）。よって<b>再帰形を直接計算</b>するしかないが、巨大な状態 (B,L,D,N) を遅い HBM に書くのは致命的。FlashAttention の思想を SSM に適用し、3つの古典技法で解決する。</p>

    <div class=&quot;hw&quot;>
      <div class=&quot;mem hbm&quot;>
        <div class=&quot;mt&quot;>🐌 HBM</div>
        <div class=&quot;ms&quot;>大容量・低速（DRAM）</div>
        <div class=&quot;it&quot;>入力 (Δ, A, B, C)</div>
        <div class=&quot;it&quot;>出力 (B, L, D) のみ書戻し</div>
      </div>
      <div class=&quot;hwarrows&quot;><div>→</div><div>←</div></div>
      <div class=&quot;mem sram&quot;>
        <div class=&quot;mt&quot;>⚡ SRAM</div>
        <div class=&quot;ms&quot;>小容量・高速（オンチップ）</div>
        <div class=&quot;it&quot;>① 離散化</div>
        <div class=&quot;it&quot;>② スキャン（再帰）</div>
        <div class=&quot;it&quot;>③ C との乗算</div>
      </div>
    </div>
    <p class=&quot;hwnote&quot;>N倍に膨らんだ状態は <b style=&quot;color:var(--teal)&quot;>一度も HBM に書かれない</b>（カーネル融合）</p>

    <div class=&quot;grid3&quot; style=&quot;margin-top:16px&quot;>
      <div class=&quot;card&quot; style=&quot;padding:18px&quot;><h3 style=&quot;font-size:1rem&quot;>① 並列スキャン</h3><p style=&quot;font-size:.86rem&quot;>再帰は単純な累積和ではないが<b>結合的</b>。Blelloch の並列スキャンで、畳み込みなしでも系列方向に並列化できる。</p></div>
      <div class=&quot;card&quot; style=&quot;padding:18px&quot;><h3 style=&quot;font-size:1rem&quot;>② カーネル融合</h3><p style=&quot;font-size:.86rem&quot;>離散化→スキャン→C乗算を SRAM 内で一気に実行。メモリ帯域律速を解消（FlashAttention と同じ発想）。</p></div>
      <div class=&quot;card&quot; style=&quot;padding:18px&quot;><h3 style=&quot;font-size:1rem&quot;>③ 再計算</h3><p style=&quot;font-size:.86rem&quot;>逆伝播に必要な中間状態を保存せず、後ろ向き計算で再計算。遅い HBM から読むより安い。</p></div>
    </div>
    <p style=&quot;margin-top:14px;font-size:.88rem&quot;>結果、最適化された FlashAttention 系 Transformer と<b>同等のメモリ使用量</b>。FLOP も、長い L では再帰 O(BLDN) の方が畳み込み O(BLD log L) より少ないことすらある。</p>
  </div>

  <!-- 4.6 -->
  <div class=&quot;step reveal&quot;>
    <div class=&quot;sk&quot;>STEP 6 — アーキテクチャ</div>
    <h3>Mamba ブロック</h3>
    <p>Mamba は <b>H3 ブロック</b>と<b>ゲート付きMLP</b>を一つの均質なブロックに融合し、それを単純に積み重ねる（独立した注意層もMLP層もない）。H3 比では最初の乗算ゲートを<b>活性化関数に置換</b>、MLP比では<b>主分岐に SSM を追加</b>した形。</p>
    <div class=&quot;block reveal&quot;>
      <div class=&quot;bnode io&quot;>入力 (model dim D)</div>
      <div class=&quot;barrow&quot;>↓</div>
      <div class=&quot;bnode proj&quot;>線形射影で拡大（拡大率 E=2）</div>
      <div class=&quot;barrow&quot;>↓ &amp;nbsp; 2分岐に分割 &amp;nbsp; ↓</div>
      <div class=&quot;branches&quot;>
        <div class=&quot;branch&quot;>
          <div class=&quot;bl&quot;>MAIN BRANCH</div>
          <div class=&quot;bnode proj&quot; style=&quot;width:100%&quot;>Conv1d（短い因果畳み込み）</div>
          <div class=&quot;barrow&quot;>↓</div>
          <div class=&quot;bnode act&quot; style=&quot;width:100%&quot;>SiLU / Swish</div>
          <div class=&quot;barrow&quot;>↓</div>
          <div class=&quot;bnode ssm&quot; style=&quot;width:100%&quot;>Selective SSM (S6)</div>
        </div>
        <div class=&quot;branch&quot; style=&quot;justify-content:center&quot;>
          <div class=&quot;bl&quot;>GATE BRANCH</div>
          <div class=&quot;bnode act&quot; style=&quot;width:100%&quot;>SiLU / Swish</div>
          <div style=&quot;color:var(--dim);font-size:.76rem;margin-top:6px&quot;>（ゲート信号）</div>
        </div>
      </div>
      <div class=&quot;barrow&quot;>↓ &amp;nbsp;<span class=&quot;gate&quot;>⊗</span>&amp;nbsp; 乗算ゲート ↓</div>
      <div class=&quot;bnode proj&quot;>線形射影で元の次元 D に戻す</div>
      <div class=&quot;barrow&quot;>↓</div>
      <div class=&quot;bnode io&quot;>出力（+ 残差接続 / 正規化）</div>
    </div>
    <div class=&quot;blocknote&quot;>
      <b>設計のポイント:</b> Conv1d は隣接トークンを混ぜ、選択SSMがトークンを独立に扱わないようにする。乗算ゲートにより MLP 部は <b>SwiGLU</b> 変種になる。
      パラメータの大半 (3ED²) は線形射影に集中し、内側のSSM自体は小さい。状態は既定で<b>実数値</b>（離散データに有効）。E=2 で Mamba ブロック2つ ≈ Transformer の MHA+MLP 1組のパラメータ量。
    </div>
  </div>
</section>

<!-- SECTION 5 -->
<section id=&quot;s5&quot; class=&quot;wrap&quot;>
  <div class=&quot;shead reveal&quot;>
    <div class=&quot;snum&quot;>05</div>
    <div>
      <span class=&quot;en&quot;>What to Study Next</span>
      <h2>次に調べるべき技術要素・キーワード</h2>
      <p>Mamba 以降、SSM エコシステムは爆発的に拡大した。最重要の後継から応用分野、そして「本当に Transformer に匹敵するのか」という未解決の論争まで。</p>
    </div>
  </div>

  <div class=&quot;feature reveal&quot;>
    <div class=&quot;ft&quot;>
      <span class=&quot;star&quot;>★ 最重要後継</span>
      <h3>Mamba-2 / State Space Duality (SSD)</h3>
      <span class=&quot;tag tagp&quot;>arXiv:2405.21060</span>
    </div>
    <p>「Transformers are SSMs」── <b>SSM と注意は同じ数学的対象の2つの計算形式</b>であることを証明。選択的SSMは <span class=&quot;mono&quot; style=&quot;color:var(--teal)&quot;>Y = (L ⊙ CBᵀ)X</span> という行列積（構造的半分離行列）で書け、減衰が全て1なら<b>因果的線形注意</b>に一致する。</p>
    <div class=&quot;pts&quot;>
      <div><b>2〜8倍高速</b>: チャンク分解で、チャンク内は注意形（密行列積でTensor Core飽和）、チャンク間は線形再帰</div>

<header class=&quot;hero wrap&quot;>
  <div class=&quot;logo&quot;>🟣🔶</div>
  <h1>Jamba <span>:</span><br><span>Attention–Mamba–MoE Hybrid</span></h1>
  <div class=&quot;sub&quot;>初の「本番級」Transformer–SSM ハイブリッド</div>
  <div class=&quot;paper&quot;>
    <span class=&quot;pill&quot;>AI21 Labs</span><span class=&quot;pill&quot;>arXiv:2403.19887</span><span class=&quot;pill&quot;>2024年3月</span><span class=&quot;pill&quot;>Jamba-1.5 → 2408.12570</span>
  </div>
  <div class=&quot;thesis&quot;>
    Jamba は<b>3つの直交する設計</b>を1つに融合した ── <b>Mamba の効率</b>（小さなメモリ・高速推論）、<b>Attention の品質と想起</b>、そして<b>MoE の容量</b>（総パラメータを増やしつつ計算は増やさない）。
    「効率的だが品質に劣る純Mamba」と「高品質だが重い純Transformer」のどちらでもなく、層レベルで両者を混ぜ、MoEで容量を稼ぐ ── これを実運用スケールで初めて成立させた。
  </div>
  <div class=&quot;heroStats reveal&quot;>
    <div class=&quot;s&quot;><div class=&quot;n&quot;>52B / 12B</div><div class=&quot;l&quot;>総パラメータ / 活性パラメータ</div></div>

    <div class=&quot;s&quot;><div class=&quot;n&quot;>8×</div><div class=&quot;l&quot;>KVキャッシュ削減（vs Mixtral）</div></div>
    <div class=&quot;s&quot;><div class=&quot;n&quot;>3×</div><div class=&quot;l&quot;>長文脈スループット（vs Mixtral）</div></div>

</header>

<!-- S1 -->
<section id=&quot;s1&quot; class=&quot;wrap&quot;>
  <div class=&quot;shead reveal&quot;><div class=&quot;snum&quot;>01</div><div>
    <span class=&quot;en&quot;>Before Jamba</span><h2>Jamba 登場前の課題</h2>
    <p>純Transformer・純Mamba・既存ハイブリッド、いずれも本番スケールの長文脈モデルとしては決め手を欠いていた。Jamba はその3つの欠落を同時に埋めにいった。</p>
  </div></div>

  <div class=&quot;tension reveal&quot;>
    <div class=&quot;tcol t-x&quot;>
      <div class=&quot;vs&quot;>効果的 / 非効率</div><div class=&quot;ttl&quot;>⚡ 純 Transformer</div>
      <div class=&quot;row&quot;><span class=&quot;ico good&quot;>✓</span><span>完璧な想起・並列学習</span></div>
      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span><b>O(N²)</b> 注意。長文脈で計算を食い尽くす</span></div>
      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span>KVキャッシュが巨大化 ── 256Kで <b>LLaMA-2: 128GB</b> / Mixtral: 32GB</span></div>
      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span>単一の要約状態がなく、推論が遅い</span></div>
    </div>
    <div class=&quot;tcol t-m&quot;>
      <div class=&quot;vs&quot;>効率的 / 品質不足</div><div class=&quot;ttl&quot;>🧠 純 Mamba (SSM)</div>
      <div class=&quot;row&quot;><span class=&quot;ico good&quot;>✓</span><span>線形時間・小さな固定状態で高速</span></div>
      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span>perplexityは良いが <b>IMDB/QuAC/NarrativeQA で大敗</b>（IMDB: 注意84.1 vs Mamba48.8）</span></div>
      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span><b>出力フォーマットに従えない</b> → ICL / induction head の限界仮説</span></div>
    </div>
    <div class=&quot;tcol t-o&quot;>
      <div class=&quot;vs&quot;>本番未到達</div><div class=&quot;ttl&quot;>🧩 既存ハイブリッド</div>
      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span>H3 / StripedHyena 等は <b>≤2.7B</b> 規模</span></div>
      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span>純Mamba や Mistral-7B に及ばないものも</span></div>
      <div class=&quot;row&quot;><span class=&quot;ico good&quot;>→</span><span>本番級の Attention-SSM ハイブリッドは<b>存在しなかった</b></span></div>
    </div>
  </div>

  <div class=&quot;axisnote reveal&quot;>
    💡 Jamba の着想 ── <b>「2つの直交する設計を組み合わせる」</b>。① Attention 層と Mamba 層を<b>層レベルで交互配置</b>して効率と品質を両取りし、② さらに <b>MoE（Mixture of Experts）</b>で総容量を増やしつつ活性パラメータ（=計算量）は抑える。
    純Mambaが苦手な<b>induction head</b>的な振る舞いは、わずか1/8の Attention 層を混ぜるだけで創発する、というのが鍵だった。
  </div>
</section>

<!-- S2 -->
<section id=&quot;s2&quot; class=&quot;wrap&quot;>
  <div class=&quot;shead reveal&quot;><div class=&quot;snum&quot;>02</div><div>
    <span class=&quot;en&quot;>What Jamba Enables</span><h2>Jamba が実現できること</h2>
    <p>効率（Mamba）・品質（Attention）・容量（MoE）の三位一体で、本番運用に耐える長文脈・高スループットを単一GPU級のハードで実現した。</p>
  </div></div>

  <div class=&quot;bigstats reveal&quot;>
    <div class=&quot;bs&quot;><div class=&quot;n&quot;>256K</div><div class=&quot;l&quot;><b>有効コンテキスト長</b><br>RULERで「本当に256Kまで効く」と確認された数少ないモデル</div></div>
    <div class=&quot;bs&quot;><div class=&quot;n&quot;>140K</div><div class=&quot;l&quot;><b>単一80GB GPU(int8)に載る文脈長</b><br>Mixtralの2倍・Llama-2-70Bの7倍</div></div>
    <div class=&quot;bs&quot;><div class=&quot;n&quot;>4<span class=&quot;u&quot;>GB</span></div><div class=&quot;l&quot;><b>256K時のKVキャッシュ</b><br>Mixtral 32GB → 8分の1。Largeは9GB（405B比 ~10×）</div></div>
    <div class=&quot;bs&quot;><div class=&quot;n&quot;>~8</div><div class=&quot;l&quot;><b>層あたり平均アクティブExpert数</b><br>16エキスパート中 top-2 を選択</div></div>
  </div>

  <h3 style=&quot;margin:18px 0 10px;font-size:1.1rem&quot;>📊 ベンチマーク（Jamba v1, 52B総/12B活性）</h3>
  <table class=&quot;reveal&quot;>
    <thead><tr><th>ベンチマーク</th><th>Jamba</th><th>Mixtral 8×7B</th><th>Llama-2 70B</th></tr></thead>
    <tbody>
      <tr><td>HellaSwag</td><td class=&quot;hl&quot;>87.1</td><td>86.7</td><td>85.3</td></tr>
      <tr><td>WinoGrande</td><td class=&quot;hl&quot;>82.5</td><td>81.2</td><td>80.2</td></tr>
      <tr><td>MMLU</td><td>67.4</td><td>70.6</td><td>69.8</td></tr>
      <tr><td>活性パラメータ</td><td class=&quot;hl&quot;>12B</td><td>12.9B</td><td>70B</td></tr>
    </tbody>
  </table>
  <p style=&quot;color:var(--muted);font-size:.9rem;margin-top:6px&quot;>Mixtral・Llama-2-70B に匹敵する品質を、より少ない総パラメータ(52B)・同等の活性(12B)で達成。さらに長文脈スループットは桁違い。ライセンスは v0.1 が <span class=&quot;tag tagg&quot;>Apache 2.0</span>（Jamba-1.5 は Jamba Open Model License）。</p>

  <h3 style=&quot;margin:24px 0 10px;font-size:1.1rem&quot;>📏 RULER 長文脈（Jamba-1.5）</h3>
  <div class=&quot;grid3 reveal&quot;>
    <div class=&quot;card&quot;><h3 style=&quot;font-size:1.05rem&quot;>Jamba-1.5-Large</h3><p>平均 <span class=&quot;hl&quot; style=&quot;font-size:1.3rem&quot;>95.7</span> / 256Kで 93.9。多くの競合が256Kでスコアを出せない中、有効長を確認。</p></div>
    <div class=&quot;card&quot;><h3 style=&quot;font-size:1.05rem&quot;>Jamba-1.5-Mini</h3><p>平均 <span class=&quot;hl&quot; style=&quot;font-size:1.3rem&quot;>92.6</span> / 256Kで 86.1。Mini(52B/12B)でも長文脈が崩れない。</p></div>
    <div class=&quot;card&quot;><h3 style=&quot;font-size:1.05rem&quot;>なぜ強い？</h3><p>Mamba層が文脈を安価に圧縮し、わずか4層のAttentionが精密な想起を担う分業。KVキャッシュが小さいから長文脈が現実的に載る。</p></div>
  </div>
</section>

<!-- S3 -->
<section id=&quot;s3&quot; class=&quot;wrap&quot;>
  <div class=&quot;shead reveal&quot;><div class=&quot;snum&quot;>03</div><div>
    <span class=&quot;en&quot;>Related Research / Lineage</span><h2>Jamba の関連研究と系譜</h2>
    <p>Jamba は3つの研究系譜の交差点にある ── <b>SSM（Mamba）</b>、<b>Transformer の注意機構</b>、そして<b>Mixture of Experts（MoE）</b>。それを本番スケールで初めて束ねた。</p>
  </div></div>

  <div class=&quot;tracks reveal&quot;>
    <div class=&quot;trackkey&quot;><span class=&quot;dotA&quot;></span>効率系（SSM / Mamba）</div>
    <div class=&quot;trackkey&quot;><span class=&quot;dotB&quot;></span>容量・品質系（Attention / MoE）</div>
  </div>

  <div class=&quot;reveal&quot;>
    <div class=&quot;tlrow&quot;>
      <div class=&quot;yr&quot;>2017<br>–21</div>
      <div class=&quot;tcell acol&quot;><div class=&quot;tnode a&quot;><div class=&quot;nm&quot;><span>S4 / SSM の基礎</span><span class=&quot;y&quot;>2111.00396</span></div><div class=&quot;ds&quot;>構造化状態空間モデル。長距離依存を線形時間で。Mambaの土台。</div></div></div>
      <div class=&quot;tcell bcol&quot;>
        <div class=&quot;tnode b&quot;><div class=&quot;nm&quot;><span>Transformer / Attention</span><span class=&quot;y&quot;>Vaswani 2017</span></div><div class=&quot;ds&quot;>自己注意。完璧な想起の源だが O(N²)。</div></div>
        <div class=&quot;tnode b&quot;><div class=&quot;nm&quot;><span>Sparse MoE</span><span class=&quot;y&quot;>Shazeer 2017 / Switch</span></div><div class=&quot;ds&quot;>疎なエキスパート選択で、計算を増やさず容量を拡大。</div></div>
      </div>
    </div>
    <div class=&quot;tlrow&quot;>
      <div class=&quot;yr&quot;>2022<br>–23</div>
      <div class=&quot;tcell acol&quot;><div class=&quot;tnode a&quot;><div class=&quot;nm&quot;><span>H3 / StripedHyena</span><span class=&quot;y&quot;>2212.14052</span></div><div class=&quot;ds&quot;>SSMで言語に挑む初期ハイブリッド。ただし≤2.7Bで本番未到達。「一部の層を注意に置換」の着想源。</div></div></div>
      <div class=&quot;tcell bcol&quot;><div class=&quot;tnode b&quot;><div class=&quot;nm&quot;><span>Mixtral 8×7B</span><span class=&quot;y&quot;>2401.04088</span></div><div class=&quot;ds&quot;>疎なMoEの代表。活性12.9B。Jambaの最も近い比較対象。</div></div></div>
    </div>
    <div class=&quot;tlrow&quot;>
      <div class=&quot;yr&quot;>2023<br>12月</div>
      <div class=&quot;tcell acol&quot;><div class=&quot;tnode a&quot;><div class=&quot;nm&quot;><span>Mamba</span><span class=&quot;y&quot;>2312.00752</span></div><div class=&quot;ds&quot;>選択的SSM。入力依存パラメータで内容を選別。Jambaの効率の心臓部。</div></div></div>
      <div class=&quot;tcell bcol&quot;></div>
    </div>
  </div>

  <div class=&quot;arrowdown reveal&quot;>▼</div>
  <div class=&quot;converge reveal&quot;>
    <div class=&quot;big&quot;>🟣 JAMBA — 3系譜の融合（2024年3月）</div>
    <p><b style=&quot;color:var(--teal)&quot;>Mamba（効率）</b> + <b style=&quot;color:var(--cyan)&quot;>Attention（品質・想起）</b> + <b style=&quot;color:var(--purple)&quot;>MoE（容量）</b> を層レベルで束ねた、<b>初の本番級 Attention-SSM ハイブリッド</b>。同年これに続き Samba・Zamba・Hymba・Bamba などハイブリッド全盛時代が到来した。</p>
  </div>

  <div class=&quot;grid2 reveal&quot; style=&quot;margin-top:22px&quot;>
    <div class=&quot;card&quot;><h3>🆚 同時代のハイブリッド</h3><ul>
      <li><b>Samba</b>（Microsoft）: Mamba + Sliding Window Attention、MoEなし、3.8B</li>
      <li><b>Zamba/Zamba2</b>（Zyphra）: Mamba本体 + <b>共有</b>注意層を再利用</li>
      <li><b>Hymba</b>（NVIDIA）: 注意とSSMを<b>同一層で並列</b>（Jambaは層を分離する逐次型）</li>
      <li><b>Nemotron-H</b>（NVIDIA）: 注意を~8%まで削減、Mamba-2採用</li>
    </ul></div>
    <div class=&quot;card&quot;><h3>🔧 Jamba-1.5 が加えたもの</h3><ul>
      <li>スケール: Large 398B/94B（9ブロック・72層）</li>
      <li>命令チューニング（3段階・関数呼び出し・多言語）</li>
      <li><b>ExpertsInt8</b> 量子化（A100で動く・FP8級の低遅延）</li>
      <li>Activation Loss（巨大活性の抑制でFP16推論を安定化）</li>
      <li>発見: ハイブリッドでは <b>Mamba-1 &amp;gt; Mamba-2</b></li>
    </ul></div>
  </div>
</section>

<!-- S4 -->
<section id=&quot;s4&quot; class=&quot;wrap&quot;>
  <div class=&quot;shead reveal&quot;><div class=&quot;snum&quot;>04</div><div>
    <span class=&quot;en&quot;>Architecture</span><h2>Jamba のアーキテクチャ</h2>
    <p>Jamba の本体は「Jamba ブロック」を積み重ねた構造。4つの自由度 <i>(l, a:m, e, n, K)</i> でハイブリッドの配合を決める。released model（v0.1）の config を実際にデコードして、層配置まで正確に見ていく。</p>
  </div></div>

  <div class=&quot;step reveal&quot;>
    <div class=&quot;sk&quot;>DESIGN — 4つの自由度</div>
    <h3>Jamba ブロックの<span class=&quot;em&quot;>設計パラメータ</span></h3>
    <p>ブロックは「ミキサー層（Mamba か Attention）＋ FFN層（MLP か MoE）」の繰り返し。配合は次の自由度で決まる。</p>
    <div class=&quot;dof&quot;>
      <div class=&quot;dofcell&quot;><div class=&quot;v&quot;>l</div><div class=&quot;eq&quot;>= 8</div><div class=&quot;nm&quot;>ブロックあたりの層数</div></div>
      <div class=&quot;dofcell&quot;><div class=&quot;v&quot;>a:m</div><div class=&quot;eq&quot;>= 1:7</div><div class=&quot;nm&quot;>Attention : Mamba 比</div></div>
      <div class=&quot;dofcell&quot;><div class=&quot;v&quot;>e</div><div class=&quot;eq&quot;>= 2</div><div class=&quot;nm&quot;>MoEを何層ごとに置くか</div></div>
      <div class=&quot;dofcell&quot;><div class=&quot;v&quot;>n</div><div class=&quot;eq&quot;>= 16</div><div class=&quot;nm&quot;>総エキスパート数</div></div>
      <div class=&quot;dofcell&quot;><div class=&quot;v&quot;>K</div><div class=&quot;eq&quot;>= 2</div><div class=&quot;nm&quot;>トークンが使うtop-K</div></div>
    </div>
    <p>released Jamba は <b>4ブロック → 32層</b>。隠れ次元4096、MLP中間14336、語彙64K、最大位置262144(256K)、GQAは32クエリ/8KVヘッド、Mamba は d_state=16。</p>
  </div>

  <div class=&quot;step reveal&quot;>
    <div class=&quot;sk&quot;>LAYOUT — 実際の層配置</div>
    <h3>1ブロック = 8層の<span class=&quot;em&quot;>交互配置</span></h3>
    <p>config（attn_period=8/offset=4, expert_period=2/offset=1）をデコードすると、<b>Attention は層 4,12,20,28 の4層だけ</b>、<b>MoE は奇数層（計16層）</b>。残り28層は Mamba。下が1ブロックの実体（×4で32層）。</p>
    <div class=&quot;jblock reveal&quot;>
      <div class=&quot;bt&quot;>JAMBA BLOCK（8層）— ×4 stacked = 32層</div>
      <div class=&quot;jlayer&quot;><div class=&quot;idx&quot;>L0</div><div class=&quot;jmix mamba&quot;>Mamba</div><div class=&quot;jffn mlp&quot;>MLP</div></div>
      <div class=&quot;jlayer&quot;><div class=&quot;idx&quot;>L1</div><div class=&quot;jmix mamba&quot;>Mamba</div><div class=&quot;jffn moe&quot;>MoE (16,top2)</div></div>
      <div class=&quot;jlayer&quot;><div class=&quot;idx&quot;>L2</div><div class=&quot;jmix mamba&quot;>Mamba</div><div class=&quot;jffn mlp&quot;>MLP</div></div>
      <div class=&quot;jlayer&quot;><div class=&quot;idx&quot;>L3</div><div class=&quot;jmix mamba&quot;>Mamba</div><div class=&quot;jffn moe&quot;>MoE (16,top2)</div></div>
      <div class=&quot;jlayer&quot;><div class=&quot;idx&quot;>L4</div><div class=&quot;jmix attn&quot;>⭐ Attention (GQA 32q/8kv)</div><div class=&quot;jffn mlp&quot;>MLP</div></div>
      <div class=&quot;jlayer&quot;><div class=&quot;idx&quot;>L5</div><div class=&quot;jmix mamba&quot;>Mamba</div><div class=&quot;jffn moe&quot;>MoE (16,top2)</div></div>
      <div class=&quot;jlayer&quot;><div class=&quot;idx&quot;>L6</div><div class=&quot;jmix mamba&quot;>Mamba</div><div class=&quot;jffn mlp&quot;>MLP</div></div>
      <div class=&quot;jlayer&quot;><div class=&quot;idx&quot;>L7</div><div class=&quot;jmix mamba&quot;>Mamba</div><div class=&quot;jffn moe&quot;>MoE (16,top2)</div></div>
      <div class=&quot;jlegend&quot;>
        <span><span class=&quot;sw&quot; style=&quot;background:rgba(94,234,212,.6)&quot;></span>Mamba ミキサー (28層)</span>
        <span><span class=&quot;sw&quot; style=&quot;background:rgba(252,211,77,.8)&quot;></span>Attention (4層のみ)</span>
        <span><span class=&quot;sw&quot; style=&quot;background:var(--card2);border:1px solid var(--border2)&quot;></span>MLP (16層)</span>
        <span><span class=&quot;sw&quot; style=&quot;background:rgba(196,163,255,.6)&quot;></span>MoE (16層)</span>
      </div>
    </div>
    <div class=&quot;blocknote&quot;>各層は <b>RMSNorm → ミキサー → 残差</b> と <b>RMSNorm → FFN → 残差</b> のpre-norm構造。Attentionはブロックに1つだけで、KVキャッシュを劇的に削減する。</div>
  </div>

  <div class=&quot;step reveal&quot;>
    <div class=&quot;sk&quot;>FINDINGS — 設計から得た知見</div>
    <h3>Jamba が明らかにした<span class=&quot;em&quot;>3つの発見</span></h3>
    <div class=&quot;grid3&quot; style=&quot;margin-top:8px&quot;>
      <div class=&quot;card&quot; style=&quot;padding:18px&quot;><h3 style=&quot;font-size:1rem&quot;>📍 位置エンコ不要</h3><p style=&quot;font-size:.86rem&quot;>Attention層の前に置かれた Mamba 層が<b>暗黙の位置情報</b>を与えるため、RoPE等を入れても結果はほぼ同じ。Jambaは明示的な位置情報を一切使わない。</p></div>
      <div class=&quot;card&quot; style=&quot;padding:18px&quot;><h3 style=&quot;font-size:1rem&quot;>⚖️ a:m 比は鈍感</h3><p style=&quot;font-size:.86rem&quot;>1:3 と 1:7 で<b>性能差はほぼゼロ</b>。ならば計算効率の良い 1:7 を採用。ハイブリッドは純Attention・純Mambaの両方を上回る。</p></div>
      <div class=&quot;card&quot; style=&quot;padding:18px&quot;><h3 style=&quot;font-size:1rem&quot;>🔁 induction head 創発</h3><p style=&quot;font-size:.86rem&quot;>わずか <b>1/8 の Attention 層</b>でも induction head が創発（1.3Bで12個確認）。少量の注意がICL能力を呼び込む。RMSNormが大規模学習を安定化。</p></div>
    </div>
  </div>
</section>

<!-- S5 -->
<section id=&quot;s5&quot; class=&quot;wrap&quot;>
  <div class=&quot;shead reveal&quot;><div class=&quot;snum&quot;>05</div><div>
    <span class=&quot;en&quot;>What to Study Next</span><h2>次に調べるべき技術要素・キーワード</h2>
    <p>Jamba は「ハイブリッド全盛時代」の幕を開けた。後継・量子化・そして他社の対照的なハイブリッド設計へ。</p>
  </div></div>

  <div class=&quot;feature reveal&quot;>
    <div class=&quot;ft&quot;><span class=&quot;star&quot;>★ 後継・量産化の鍵</span><h3>Jamba-1.5 と ExpertsInt8</h3><span class=&quot;tag tagp&quot;>arXiv:2408.12570</span></div>
    <p>Jamba-1.5 は同じレシピを <b>Large 398B/94B</b> までスケールし、命令チューニングを施した本番モデル。サービングの肝が <b>ExpertsInt8</b> 量子化。</p>
    <div class=&quot;pts&quot;>
      <div>重みの<b>85%超がMoE層</b>に集中 → そこをINT8で保存</div>
      <div>vLLMのfused_moeカーネル内で<b>BF16に復号</b>、オーバーヘッド極小</div>
      <div>キャリブレーション不要・<b>A100で動く</b>（FP8はH100限定）</div>
      <div>FP8並みの低遅延、GPTQを上回る品質</div>
    </div>
  </div>

  <div class=&quot;kwgrid reveal&quot;>
    <div class=&quot;kwcat&quot;><div class=&quot;ch&quot;>🔀 他のハイブリッド（比較対象）</div><div class=&quot;csub&quot;>設計思想の違いを横並びで学ぶ</div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>Samba</span><span class=&quot;kds&quot;>Mamba + Sliding Window Attention。MoEなしの最小逐次ハイブリッド<span class=&quot;kid&quot;>Microsoft · 2406.07522</span></span></div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>Hymba</span><span class=&quot;kds&quot;>注意とSSMを同一層で<b>並列</b>に。Jambaの逐次型と対照的<span class=&quot;kid&quot;>NVIDIA · 2411.13676</span></span></div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>Zamba / Zamba2</span><span class=&quot;kds&quot;>Mamba本体 + 共有注意層。パラメータ効率重視<span class=&quot;kid&quot;>Zyphra · 2405.16712</span></span></div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>Nemotron-H / Bamba</span><span class=&quot;kds&quot;>注意~8%のMamba-2ハイブリッド / IBMの9B<span class=&quot;kid&quot;>2504.03624</span></span></div>
    </div>
    <div class=&quot;kwcat&quot;><div class=&quot;ch&quot;>🧱 基盤要素</div><div class=&quot;csub&quot;>Jambaを構成する技術の深掘り</div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>Mamba / SSD</span><span class=&quot;kds&quot;>選択的SSM。ハイブリッドではMamba-1が優位という発見も<span class=&quot;kid&quot;>2312.00752 / 2405.21060</span></span></div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>Mixture of Experts</span><span class=&quot;kds&quot;>Switch / Mixtral。疎なルーティングで容量を拡大<span class=&quot;kid&quot;>2401.04088</span></span></div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>GQA</span><span class=&quot;kds&quot;>Grouped-Query Attention。KVヘッド共有でキャッシュ削減</span></div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>量子化サービング</span><span class=&quot;kds&quot;>ExpertsInt8 / FP8 / GPTQ。MoEの実運用最適化</span></div>
    </div>
  </div>

  <div class=&quot;openprob reveal&quot;>
    <h3>🔬 未解決の問い</h3>
    <div class=&quot;pp&quot;><div class=&quot;q&quot;>① 最適な Attention:Mamba 比は？</div><div class=&quot;a&quot;>Jambaは1:3≈1:7、Nemotron-Hは~1:12まで攻めた。超大規模での最適比は未確定。Attention層を<b>どこに置くか</b>も研究余地。</div></div>
    <div class=&quot;pp&quot;><div class=&quot;q&quot;>② MoE と SSM は大規模で相性が良いのか？</div><div class=&quot;a&quot;>Jambaは「良い」を示したが、MoEと状態空間モデルの相互作用のメカニズムは未解明。</div></div>
    <div class=&quot;pp&quot;><div class=&quot;q&quot;>③ なぜ ハイブリッドでは Mamba-1 &amp;gt; Mamba-2 なのか？</div><div class=&quot;a&quot;>全注意層が大域文脈を集約するため、Mamba-2の大きな状態の利点が薄れる、という仮説止まり。ICL/induction headがSSMで創発するかも未解明。</div></div>
  </div>
</section>

  <div class=&quot;paper&quot;>

    Samba の哲学はただ一つ ── <b>「最もシンプルに SSM と注意を調和させる」</b>。
    Mamba が<b>無限の履歴を安価に圧縮</b>し（線形・再帰）、Sliding Window Attention が<b>直近の窓で精密に想起</b>する（線形・有界窓）。
    両者を層レベルで交互に積むだけで、<b>4Kで学習して256Kまで完璧な記憶で外挿</b>し、最大1Mまでperplexityが改善する。

<section id=&quot;s1&quot; class=&quot;wrap&quot;>
  <div class=&quot;shead reveal&quot;><div class=&quot;snum&quot;>01</div><div>
    <span class=&quot;en&quot;>Before Samba</span><h2>Samba 登場前の課題</h2>
    <p>「無限の文脈長を効率的にモデル化する」ことは長年の難問だった。既存手法は<b>二次の計算量</b>か<b>限定的な長さ外挿</b>のどちらかに苦しんでいた。</p>
  </div></div>

  <div class=&quot;tension reveal&quot;>
    <div class=&quot;tcol t-x&quot;>
      <div class=&quot;vs&quot;>高品質 / 外挿不能</div><div class=&quot;ttl&quot;>⚡ 純 Attention</div>
      <div class=&quot;row&quot;><span class=&quot;ico good&quot;>✓</span><span>長距離依存を捉え、並列学習が容易</span></div>

      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span>学習長を超えて<b>外挿できない</b>。全注意層が1つあるだけで16Kでperplexityが爆発</span></div>
    </div>
    <div class=&quot;tcol t-m&quot;>
      <div class=&quot;vs&quot;>効率的 / 想起が苦手</div><div class=&quot;ttl&quot;>🧠 純 Mamba</div>

      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span><b>マルコフ性</b>ゆえ精密な記憶想起が苦手（SQuADで顕著）</span></div>
      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span>極端に長いと外挿も頭打ち（1Mでppl緩やかに悪化）</span></div>
    </div>
    <div class=&quot;tcol t-s&quot;>

      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span>passkey精度が~30%で頭打ち</span></div>
    </div>
  </div>

  <div class=&quot;axisnote reveal&quot;>
    💡 Samba の着想 ── 役割分担を<b>最もシンプルな形</b>で実装する。Mamba は「全履歴を固定状態に圧縮する無限記憶」、SWA は「直近の窓を高精細に取り出す精密検索」。
    複雑な仕掛け（MoEも並列ヘッドも）は使わず、<b>層を交互に積むだけ</b>で、線形時間のまま無限長へ外挿する。
  </div>
</section>

    <p>「短く学習して、遥か遠くまで外挿する」── これが Samba の代名詞。少ない注意容量で、長文脈の品質とスループットを両立する。</p>

  <div class=&quot;shead reveal&quot;><div class=&quot;snum&quot;>03</div><div>
    <span class=&quot;en&quot;>Related Research / Lineage</span><h2>Samba の関連研究と系譜</h2>
    <p>Samba は<b>選択的SSM（Mamba）</b>と<b>Sliding Window Attention</b>を、SwiGLU・RoPE で結ぶ。論文は多数の代替構成をアブレーションで比較し、「なぜ最もシンプルな逐次ハイブリッドが勝つか」を実証した。</p>

  <div class=&quot;reveal&quot;>

      <div class=&quot;tcell bcol&quot;><div class=&quot;tnode b&quot;><div class=&quot;nm&quot;><span>Sliding Window Attention</span><span class=&quot;y&quot;>Longformer / Mistral</span></div><div class=&quot;ds&quot;>局所窓に限定した注意で線形コスト化。SambaのSWA層の源流。</div></div></div>
    </div>
    <div class=&quot;tlrow&quot;>
      <div class=&quot;yr&quot;>2023<br>12月</div>
      <div class=&quot;tcell acol&quot;><div class=&quot;tnode a&quot;><div class=&quot;nm&quot;><span>Mamba</span><span class=&quot;y&quot;>2312.00752</span></div><div class=&quot;ds&quot;>選択的SSM。入力依存で内容を選別。Sambaの「無限記憶」担当。</div></div></div>
      <div class=&quot;tcell bcol&quot;><div class=&quot;tnode b&quot;><div class=&quot;nm&quot;><span>RecurrentGemma / Griffin</span><span class=&quot;y&quot;>Google</span></div><div class=&quot;ds&quot;>ゲート付き線形再帰 + 局所注意。「再帰+局所注意」の最も近い従兄弟。</div></div></div>
    </div>
    <div class=&quot;tlrow&quot;>
      <div class=&quot;yr&quot;>2024<br>3月</div>
      <div class=&quot;tcell acol&quot;><div class=&quot;tnode a&quot;><div class=&quot;nm&quot;><span>Jamba</span><span class=&quot;y&quot;>2403.19887</span></div><div class=&quot;ds&quot;>Mamba+注意+MoE。Sambaの直前のハイブリッド。Sambaは「MoEなし・全注意でなくSWA」で差別化。</div></div></div>
      <div class=&quot;tcell bcol&quot;></div>
    </div>
  </div>

  <div class=&quot;arrowdown reveal&quot;>▼</div>
  <div class=&quot;converge reveal&quot;>
    <div class=&quot;big&quot;>🩵 SAMBA — 最小構成の勝利（2024年6月）</div>
    <p><b style=&quot;color:var(--teal)&quot;>Mamba（無限記憶）</b> + <b style=&quot;color:var(--cyan)&quot;>SWA（精密想起）</b> + <b style=&quot;color:var(--purple)&quot;>SwiGLU（知識）</b> を層レベルで交互に積むだけ。MoEも並列ヘッドもなし。エントロピー分析が示すのは<b>層ごとの役割分化</b> ── 中間層は低エントロピーで精密検索、Mamba層は再帰構造のモデル化に専念する。</p>
  </div>

  <div class=&quot;card reveal&quot; style=&quot;margin-top:22px&quot;><h3>🔬 アブレーション：なぜこの構成か</h3>
    <p>論文は同じ骨格で再帰ブロックだけ差し替えて比較した（1.7B, 15ベンチ平均）：</p>
    <ul>
      <li><b>Samba（Mamba+SWA）54.33</b> &amp;gt; Mamba-MLP 53.77 &amp;gt; Mamba 52.31 &amp;gt; Mamba-SWA-MLP 51.38 &amp;gt; Llama-3 51.17 &amp;gt; Mistral 51.12</li>
      <li><b>Sliding RetNet</b>（入力非依存の減衰）→ 1.4Bで外挿が劣化</li>
      <li><b>Sliding GLA</b>（入力依存ゲート）→ それでもSamba 421Bに及ばず → <b>Mambaの選択が効いている</b></li>
      <li>注意は<b>1 KVヘッドが最適</b>。SWA単独の半分のクエリヘッドで足りる ── 注意容量はごく僅かで良い</li>
    </ul>
  </div>
</section>

<!-- S4 -->
<section id=&quot;s4&quot; class=&quot;wrap&quot;>
  <div class=&quot;shead reveal&quot;><div class=&quot;snum&quot;>04</div><div>
    <span class=&quot;en&quot;>Architecture</span><h2>Samba のアーキテクチャ</h2>
    <p>構造は驚くほど単純。<b>Mamba → MLP → SWA → MLP</b> という4サブ層のスーパーブロックをひたすら繰り返すだけ（偶数層=Mamba、奇数層=SWA、各々が専用のSwiGLU MLPを持つ）。</p>
  </div></div>

  <div class=&quot;step reveal&quot;>
    <div class=&quot;sk&quot;>CORE — 繰り返し単位</div>
    <h3>4サブ層の<span class=&quot;em&quot;>スーパーブロック</span></h3>
    <p>各サブ層は <b>pre-norm（RMSNorm）→ 本体 → 残差</b> の構造。これを N/2 回繰り返す。</p>
    <div class=&quot;sblock reveal&quot;>
      <div class=&quot;superlabel&quot;>SUPER-BLOCK ── N/2 回繰り返す（3.8Bでは Mamba32 + SWA32 = 64サブ層）</div>
      <div class=&quot;snode mamba&quot;><span class=&quot;lab&quot;>① Mamba 層 (S6)</span><span class=&quot;role&quot;>全履歴を固定状態に圧縮 / 無限記憶・位置情報は暗黙</span></div>
      <div class=&quot;sarrow&quot;>↓</div>
      <div class=&quot;snode mlp&quot;><span class=&quot;lab&quot;>② SwiGLU MLP</span><span class=&quot;role&quot;>事実知識・非線形変換</span></div>
      <div class=&quot;sarrow&quot;>↓</div>
      <div class=&quot;snode swa&quot;><span class=&quot;lab&quot;>③ Sliding Window Attention (w=2048)</span><span class=&quot;role&quot;>直近の窓を高精細に想起 / RoPE</span></div>
      <div class=&quot;sarrow&quot;>↓</div>
      <div class=&quot;snode mlp&quot;><span class=&quot;lab&quot;>④ SwiGLU MLP</span><span class=&quot;role&quot;>事実知識・非線形変換</span></div>
      <div class=&quot;repeat&quot;>⟳ 繰り返し</div>
    </div>
    <div class=&quot;blocknote&quot;><b>役割分担:</b> Mamba は<b>位置エンコ不要</b>で全履歴を線形圧縮（推論の安価なバックボーン）、SWA は<b>2048トークンの窓</b>でRoPE付き精密検索。窓は「FlashAttention-2 と Mamba の選択スキャンが同速になる長さ」として2048を選択（学習長は窓×2 = 4096）。</div>
  </div>

  <div class=&quot;step reveal&quot;>
    <div class=&quot;sk&quot;>INNER — Mamba 層の心臓</div>
    <h3>選択的SSM（S6）の<span class=&quot;em&quot;>再帰式</span></h3>
    <p>展開状態 <i>Z<sub>t</sub></i> を、入力依存のゲートで更新する。これが「何を長期に覚えるか」を内容で選ぶ。</p>
    <div class=&quot;eq&quot;>
      <i>Z</i><sub>t</sub> <span class=&quot;op&quot;>=</span> exp(<span class=&quot;op&quot;>−</span><i>Δ</i><sub>t</sub> ⊙ exp(<i>A</i>)) ⊙ <i>Z</i><sub>t−1</sub> <span class=&quot;op&quot;>+</span> <i>Δ</i><sub>t</sub> ⊙ (<i>B</i><sub>t</sub> ⊗ <i>U</i><sub>t</sub>)<br>
      <i>Y</i><sub>t</sub> <span class=&quot;op&quot;>=</span> <i>Z</i><sub>t</sub> <i>C</i><sub>t</sub> <span class=&quot;op&quot;>+</span> <i>D</i> ⊙ <i>U</i><sub>t</sub>
      <small>状態次元 d_s=16 / 拡大率2 / Short-Conv kernel=4 / Δ範囲[0.001, 0.1] / A初期化=S4D-Real</small>
    </div>
  </div>

  <div class=&quot;step reveal&quot;>
    <div class=&quot;sk&quot;>CONFIG — 3.8B の実体</div>
    <h3>モデル構成と<span class=&quot;em&quot;>極端なGQA</span></h3>
    <div class=&quot;grid3&quot; style=&quot;margin-top:8px&quot;>
      <div class=&quot;card&quot; style=&quot;padding:18px&quot;><h3 style=&quot;font-size:1rem&quot;>📐 層構成</h3><p style=&quot;font-size:.86rem&quot;><b>64サブ層</b>（Mamba 32 + SWA 32 を交互）。モデル幅2816、MLP中間9984、語彙32064。</p></div>
      <div class=&quot;card&quot; style=&quot;padding:18px&quot;><h3 style=&quot;font-size:1rem&quot;>🎯 11クエリ → 1 KVヘッド</h3><p style=&quot;font-size:.86rem&quot;>ほぼMQAの極端なGQA。「注意にはごく僅かな容量しか要らない」という発見の現れ。</p></div>
      <div class=&quot;card&quot; style=&quot;padding:18px&quot;><h3 style=&quot;font-size:1rem&quot;>📚 学習</h3><p style=&quot;font-size:.86rem&quot;>3.2Tトークン（Phi-3データ）。学習系列長4096・SWA窓2048。pre-norm + RMSNorm + 残差。</p></div>
    </div>
    <div class=&quot;blocknote&quot;>なぜ無限外挿できるか ── <b>Mamba が履歴全体を線形コストで圧縮</b>し、<b>SWA が有界窓で正確に検索</b>する。両者とも系列長に対して線形なので、学習窓を超えても破綻せず、コストも線形のまま伸びる。</div>
  </div>
</section>

<!-- S5 -->
<section id=&quot;s5&quot; class=&quot;wrap&quot;>
  <div class=&quot;shead reveal&quot;><div class=&quot;snum&quot;>05</div><div>
    <span class=&quot;en&quot;>What to Study Next</span><h2>次に調べるべき技術要素・キーワード</h2>
    <p>「長さ外挿」と「ハイブリッド設計」の2軸で深掘りが続く。Sambaの単純さが、逆に多くの問いを開いた。</p>
  </div></div>

  <div class=&quot;feature reveal&quot;>
    <div class=&quot;ft&quot;><span class=&quot;star&quot;>★ 中心テーマ</span><h3>長さ外挿（Length Extrapolation）</h3><span class=&quot;tag tagk&quot;>unlimited context</span></div>
    <p>「短く学習して長く使う」を実現する技術群。Sambaは構造で解いたが、位置エンコ側からのアプローチも併せて学ぶと理解が深まる。</p>
    <div class=&quot;pts&quot;>
      <div><b>Self-Extend</b>: 推論時のグループ化で窓を拡張（二次コストの課題）</div>
      <div><b>Position Interpolation / NoPE</b>: 位置エンコの補間・除去</div>
      <div><b>StreamingLLM</b>: attention sink を使った無限ストリーミング</div>
      <div><b>Short Convolution</b>: 線形再帰/SWA層を底上げする謎の汎用enhancer</div>
    </div>
  </div>

  <div class=&quot;kwgrid reveal&quot;>
    <div class=&quot;kwcat&quot;><div class=&quot;ch&quot;>🔀 他のハイブリッド（比較対象）</div><div class=&quot;csub&quot;>Sambaは「最小・逐次」型。他と対比して学ぶ</div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>Jamba</span><span class=&quot;kds&quot;>Mamba + 注意 + <b>MoE</b>。Sambaより複雑、全注意を使用<span class=&quot;kid&quot;>AI21 · 2403.19887</span></span></div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>Hymba</span><span class=&quot;kds&quot;>注意とSSMを同一層で<b>並列</b>。Sambaの逐次型と対照<span class=&quot;kid&quot;>NVIDIA · 2411.13676</span></span></div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>RecurrentGemma / Griffin</span><span class=&quot;kds&quot;>ゲート付き線形再帰 + 局所注意。最も近い従兄弟<span class=&quot;kid&quot;>Google</span></span></div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>Zamba / Nemotron-H</span><span class=&quot;kds&quot;>共有注意 / 注意~8%のMamba-2ハイブリッド<span class=&quot;kid&quot;>2405.16712 / 2504.03624</span></span></div>
    </div>
    <div class=&quot;kwcat&quot;><div class=&quot;ch&quot;>🧱 基盤要素</div><div class=&quot;csub&quot;>Sambaを構成する技術</div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>Mamba / 選択的SSM</span><span class=&quot;kds&quot;>入力依存パラメータによる内容選択<span class=&quot;kid&quot;>2312.00752</span></span></div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>Sliding Window Attn</span><span class=&quot;kds&quot;>局所窓注意。窓サイズと系列長/窓比が論点<span class=&quot;kid&quot;>Longformer / Mistral</span></span></div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>GQA / MQA</span><span class=&quot;kds&quot;>1 KVヘッドで足りる ── 注意容量の最小化</span></div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>SwiGLU / RoPE / RMSNorm</span><span class=&quot;kds&quot;>標準的だが効くビルディングブロック</span></div>
    </div>
  </div>

  <div class=&quot;openprob reveal&quot;>
    <h3>🔬 Samba が開いた問い</h3>
    <div class=&quot;pp&quot;><div class=&quot;q&quot;>① 最適な窓サイズ・Mamba:SWA比は？</div><div class=&quot;a&quot;>論文は系列長/窓比=2を発見。窓512/1024/2048のアブレーションあり。注意は<b>1 KVヘッドが最適</b>だった ── 「注意にどれだけパラメータを割くべきか」。</div></div>
    <div class=&quot;pp&quot;><div class=&quot;q&quot;>② なぜ単純な逐次型が複雑な方式に勝つのか？</div><div class=&quot;a&quot;>全注意ハイブリッドは16Kでperplexity爆発。エントロピー分析は<b>層の役割分化</b>を示すが、理論的解明は途上。</div></div>
    <div class=&quot;pp&quot;><div class=&quot;q&quot;>③ タスク適応型の動的アーキテクチャ</div><div class=&quot;a&quot;>Mamba-SWA-MLPはGSM8Kだけ Samba に勝った。タスクごとに構成を変える<b>動的アーキテクチャ</b>が将来課題。</div></div>
  </div>
</section>

<header class=&quot;hero wrap&quot;>
  <div class=&quot;logo&quot;>💚🧩</div>
  <h1>Hymba <span>:</span><br><span>Hybrid-head Architecture</span></h1>
  <div class=&quot;sub&quot;>注意とSSMを「同一層・並列」で走らせる小型言語モデル</div>
  <div class=&quot;paper&quot;>
    <span class=&quot;pill&quot;>NVIDIA</span><span class=&quot;pill&quot;>arXiv:2411.13676</span><span class=&quot;pill&quot;>2024年11月</span><span class=&quot;pill&quot;>ICLR 2025</span>
  </div>
  <div class=&quot;thesis&quot;>
    Jamba や Samba は注意層とSSM層を<b>別々の深さに積む（逐次型）</b>── どの層もその1機構にボトルネックされる。
    Hymba の発想は逆だ ── <b>同一層・同一トークンに、注意ヘッドとSSMヘッドを「並列」に走らせる</b>。
    注意が<b>高精細な想起</b>を、SSMが<b>効率的な要約</b>を同時に担い、両者を融合する。小型・オンデバイスでも想起を犠牲にしない。
  </div>
  <div class=&quot;heroStats reveal&quot;>

<!-- S1 -->
<section id=&quot;s1&quot; class=&quot;wrap&quot;>
  <div class=&quot;shead reveal&quot;><div class=&quot;snum&quot;>01</div><div>
    <span class=&quot;en&quot;>Before Hymba</span><h2>Hymba 登場前の課題</h2>
    <p>注意とSSMは得意が真逆。そして<b>「層を分けて積む」逐次ハイブリッド</b>には、構造的な限界があった ── 各トークンはその層の単一機構しか通れない。</p>
  </div></div>

  <div class=&quot;tension reveal&quot;>
    <div class=&quot;tcol t-a&quot;>
      <div class=&quot;vs&quot;>高精細 / 高コスト</div><div class=&quot;ttl&quot;>⚡ 注意（Attention）</div>
      <div class=&quot;row&quot;><span class=&quot;ico good&quot;>✓</span><span><b>高解像度の想起</b>（トークン単位の正確な検索）</span></div>
      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span><b>O(N²)</b> 計算</span></div>
      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span>KVキャッシュが線形に肥大 ── 小型/オンデバイスでは致命的</span></div>
    </div>
    <div class=&quot;tcol t-s&quot;>
      <div class=&quot;vs&quot;>効率的 / 低精細</div><div class=&quot;ttl&quot;>🧠 SSM（Mamba）</div>
      <div class=&quot;row&quot;><span class=&quot;ico good&quot;>✓</span><span><b>効率的な文脈要約</b>・定数キャッシュ・O(N)</span></div>
      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span><b>低解像度の想起</b> ── 固定状態に押し込むため正確な検索が苦手</span></div>
    </div>
    <div class=&quot;tcol t-h&quot;>
      <div class=&quot;vs&quot;>逐次型の限界</div><div class=&quot;ttl&quot;>🧱 Jamba / Samba（逐次）</div>
      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span>注意層とSSM層を<b>別々の深さ</b>に配置</span></div>
      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span>トークンはその層の<b>単一機構にボトルネック</b></span></div>
      <div class=&quot;row&quot;><span class=&quot;ico bad&quot;>✕</span><span><b>同一トークン・同一層</b>で「高精細想起」と「効率的要約」を同時に得られない</span></div>
    </div>
  </div>

  <div class=&quot;axisnote reveal&quot;>
    💡 Hymba の着想 ── 想起と要約は<b>すべてのトークン・すべての層で同時に利用可能であるべき</b>。
    逐次スタックでは不可能なこれを、<b>並列ハイブリッドヘッド</b>で実現する。さらに、注意が無意味なBOSトークンに<b>「無理やり注意を向けてしまう」（attention sink）</b>問題も、学習可能なメタトークンで解消する。
  </div>
</section>

<!-- S2 -->
<section id=&quot;s2&quot; class=&quot;wrap&quot;>
  <div class=&quot;shead reveal&quot;><div class=&quot;snum&quot;>02</div><div>
    <span class=&quot;en&quot;>What Hymba Enables</span><h2>Hymba が実現できること</h2>
    <p>並列ヘッド＋キャッシュ最適化で、<b>2B未満のサイズで最高精度</b>。しかもキャッシュは桁違いに小さく、スループットは数倍 ── オンデバイスの理想形。</p>
  </div></div>

  <div class=&quot;bigstats reveal&quot;>
    <div class=&quot;bs&quot;><div class=&quot;n&quot;>61.06<span class=&quot;u&quot;>%</span></div><div class=&quot;l&quot;><b>平均精度</b><br>Llama-3.2-3B(59.74%)を +1.32pt 上回る（半分のサイズで）</div></div>

<!-- S4 -->
<section id=&quot;s4&quot; class=&quot;wrap&quot;>
  <div class=&quot;shead reveal&quot;><div class=&quot;snum&quot;>04</div><div>
    <span class=&quot;en&quot;>Architecture</span><h2>Hymba のアーキテクチャ</h2>
    <p>核心は<b>並列ハイブリッドヘッド</b>。1つの層の中で、同じ入力を注意ヘッドとSSMヘッドが同時に処理し、正規化して融合する。これが逐次型との決定的な違い。</p>
  </div></div>

  <div class=&quot;step reveal&quot; style=&quot;position:relative&quot;>
    <div class=&quot;sk&quot;>CORE — 並列ハイブリッドヘッド</div>
    <span class=&quot;parallel-tag&quot;>PARALLEL ⇄ 逐次型と対照的</span>
    <h3>同一層で<span class=&quot;em&quot;>注意 ∥ SSM</span> を並列実行</h3>
    <p>入力を共有の潜在特徴 <i>X̃</i> に射影し、<b>2つの経路に同時に</b>流す。各出力を正規化し、学習可能なスケールで再調整して平均融合する。</p>
    <div class=&quot;phead reveal&quot;>
      <div class=&quot;pnode pin&quot;>入力トークン X（+ メタトークン128個）</div>
      <div class=&quot;parrow&quot;>↓</div>
      <div class=&quot;pnode pproj&quot;>入力射影 → 共有潜在特徴 X̃</div>
      <div class=&quot;splitlabel&quot;>━━ 並列に分岐（同一トークン・同一層）━━</div>
      <div class=&quot;pbranches&quot;>
        <div class=&quot;pbranch attn&quot;>
          <div class=&quot;bh&quot;>⚡ 注意ヘッド</div>
          <div class=&quot;bm&quot;>高解像度の想起</div>
          <div class=&quot;pcell&quot;>Y_attn = softmax(QKᵀ)V · X̃</div>
          <span class=&quot;pmem snap&quot;>スナップショット記憶</span>
        </div>
        <div class=&quot;pbranch ssm&quot;>
          <div class=&quot;bh&quot;>🧠 SSMヘッド</div>
          <div class=&quot;bm&quot;>効率的な文脈要約</div>
          <div class=&quot;pcell&quot;>Y_ssm = G ⊙ α(A,B,C,Δ)·X̃</div>
          <span class=&quot;pmem fade&quot;>フェード記憶</span>
        </div>
      </div>
      <div class=&quot;parrow&quot;>↓ 各出力を正規化 → 学習可能スケール β → 平均 ↓</div>
      <div class=&quot;fuse&quot;>融合 + 出力射影 W_out</div>
    </div>
    <div class=&quot;eq&quot;>
      <i>Y</i> <span class=&quot;op&quot;>=</span> <i>W</i><sub>out</sub> ( <i>β</i><sub>1</sub> · norm(<i>M</i><sub>attn</sub> <i>X̃</i>) <span class=&quot;op&quot;>+</span> <i>β</i><sub>2</sub> · norm(<i>M</i><sub>ssm</sub> <i>X̃</i>) )
      <small>β₁,β₂ = チャンネル毎の学習可能スケールベクトル / SSM出力は注意より大きいため正規化が必須 / SSM:注意のパラメータ比 = 5:1</small>
    </div>
  </div>

  <div class=&quot;step reveal&quot;>
    <div class=&quot;sk&quot;>MEMORY — 3種の記憶</div>
    <h3>1つの層が持つ<span class=&quot;em&quot;>3つの記憶</span></h3>
    <div class=&quot;triad&quot;>
      <div class=&quot;mem3 snap&quot;><div class=&quot;mi&quot;>📸</div><h4>スナップショット記憶</h4><p>注意ヘッド由来。高解像度・特定時点の正確な想起。</p></div>
      <div class=&quot;mem3 fade&quot;><div class=&quot;mi&quot;>🌊</div><h4>フェード記憶</h4><p>SSMヘッド由来。減衰する要約。現在トークン近傍に集中。</p></div>
      <div class=&quot;mem3 meta&quot;><div class=&quot;mi&quot;>🗂️</div><h4>メタ記憶</h4><p>128個の学習可能メタトークン。圧縮された世界知識・大域アンカー。</p></div>
    </div>
    <div class=&quot;blocknote&quot;><b>メタトークン（128個）</b>は入力系列の先頭に付与される学習済み埋め込み。① 無意味なBOSへの<b>強制注意（attention sink）を緩和</b>し注意を情報に再配分、② <b>学習されたattention sink</b>としてエントロピー崩壊を防止、③ ドメイン別に異なるトークンが発火し<b>世界知識を圧縮保持</b>、④ SWA下でも常に窓内にあり大域アンカーになる。推論時は固定なのでKVを事前計算して保存できる。</div>
  </div>

  <div class=&quot;step reveal&quot;>
    <div class=&quot;sk&quot;>EFFICIENCY — キャッシュ最適化</div>
    <h3>3つの<span class=&quot;em&quot;>大域注意層</span>＋層間KV共有</h3>
    <p>32層のうち<b>大域（全）注意はわずか3層 [0, 15, 31]（先頭・中央・末尾）</b>。残り29層は<b>1024トークンの局所Sliding Window Attention</b>。SSMヘッドが既に大域文脈を運ぶので、ほとんどの層は全注意が要らない。</p>
    <div class=&quot;laystrip reveal&quot;>
      <div class=&quot;lt&quot;>32層の注意レイアウト ── 🟡=大域注意(3層) / 🟢=局所SWA window=1024(29層)</div>
      <div class=&quot;layrow&quot; id=&quot;layrow&quot;></div>
      <div class=&quot;laylegend&quot;>
        <span><span class=&quot;sw&quot; style=&quot;background:rgba(252,211,77,.6)&quot;></span>大域注意 [0,15,31]</span>
        <span><span class=&quot;sw&quot; style=&quot;background:rgba(94,234,212,.4)&quot;></span>局所SWA (window 1024)</span>
        <span>＋ 隣接2層ペアで<b style=&quot;color:var(--text)&quot;>KVキャッシュ共有</b> ＋ GQA 25q→5kv</span>
      </div>
    </div>
    <div class=&quot;blocknote&quot;>全層をSWAにすると想起が20%以上低下。だが戦略的な3層に大域注意を戻すだけで精度を回復し、<b>2.7×スループット・3.8×キャッシュ削減</b>。隣接層ペアのKV共有は<b>+1.15×スループット・+0.60%精度</b>のタダ飯。学習は1.5Tトークン、系列長2K（最後の100Bで8Kに拡張）。</div>
  </div>
</section>

    <span class=&quot;en&quot;>What to Study Next</span><h2>次に調べるべき技術要素・キーワード</h2>
    <p>「並列 vs 逐次」のハイブリッド論争、小型/オンデバイスLM、そしてメタトークンやKVキャッシュ圧縮へ。</p>
  </div></div>

  <div class=&quot;feature reveal&quot;>
    <div class=&quot;ft&quot;><span class=&quot;star&quot;>★ 重要な対比</span><h3>並列 vs 逐次 ハイブリッド論争</h3><span class=&quot;tag tagg&quot;>Nemotron-H 2504.03624</span></div>
    <p>興味深いことに、NVIDIA自身の後継 <b>Nemotron-H</b>（8B/47B/56B）は、Hymbaの並列ヘッドではなく<b>逐次型（Mamba-2 + 注意を交互、注意は~8%）</b>に回帰した。大規模では逐次、小型では並列が有利なのか? は重要な問い。</p>
    <div class=&quot;pts&quot;>
      <div><b>Hymba（並列）</b>: 同一層で注意とSSMを融合、小型1.5Bで強い</div>
      <div><b>Nemotron-H（逐次）</b>: Mamba-2を主体に注意を少数散らす、大規模向け</div>
      <div><b>Jamba/Samba（逐次）</b>: 層を分離。MoE有無・SWA有無で分岐</div>

      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>ViT registers</span><span class=&quot;kds&quot;>学習可能レジスタトークンで spurious attention を吸収<span class=&quot;kid&quot;>Darcet+ 2023</span></span></div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>Prefix-tuning / soft prompt</span><span class=&quot;kds&quot;>学習可能な前置トークンの源流</span></div>
    </div>

      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>Cross-layer KV (CLA/YOCO)</span><span class=&quot;kds&quot;>層をまたいでKVを共有</span></div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>GQA / MQA</span><span class=&quot;kds&quot;>ヘッド間KV共有（Hymbaは25q→5kv）</span></div>

      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>SmolLM2 / Qwen2.5</span><span class=&quot;kds&quot;>sub-2B の強豪。Hymbaの比較対象</span></div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>MobileLLM / Phi</span><span class=&quot;kds&quot;>オンデバイス志向の小型LM</span></div>
      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>RecurrentGemma / Griffin</span><span class=&quot;kds&quot;>線形再帰+局所注意の小型効率モデル</span></div>

      <div class=&quot;kwitem&quot;><span class=&quot;knm&quot;>Nemotron-H</span><span class=&quot;kds&quot;>逐次回帰したMamba-2ハイブリッド大規模族<span class=&quot;kid&quot;>2504.03624</span></span></div>

  const tabs = document.querySelectorAll('.tab');
  const frames = document.querySelectorAll('.frame');
  tabs.forEach(t => t.addEventListener('click', () => {
    const target = t.dataset.target;
    tabs.forEach(x => x.classList.toggle('active', x === t));
    frames.forEach(f => f.classList.toggle('show', f.id === 'f-' + target));
  }));
</script>
</body>
</html>
